<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f9fafb;
            padding-bottom: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-top: 40px;
            overflow: hidden;
        }
        .content {
            padding: 40px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: #000000;
            text-decoration: none;
            margin-bottom: 32px;
            display: block;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #111827;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #4b5563;
            margin-bottom: 24px;
        }
        .button {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .otp-container {
            background-color: #f3f4f6;
            border-radius: 8px;
            padding: 16px;
            font-family: "SF Mono", "Roboto Mono", Menlo, monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #111827;
            margin-bottom: 32px;
            display: inline-block;
            min-width: 200px;
        }
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 14px;
            color: #9ca3af;
        }
        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 32px 0;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="content">
                <a href="{{ .SiteURL }}" class="logo">QRky</a>
                <h1>Reset Your Password</h1>
                <p>We received a request to reset the password for your account. Use the button below or the verification code to proceed.</p>
                
                <a href="{{ .ConfirmationURL }}" class="button">Reset Password</a>
                
                <div class="divider"></div>
                
                <p>Use this One Time Pin (OTP) in the form:</p>
                <div class="otp-container">
                    {{ .Token }}
                </div>
            </div>
        </div>
        <div class="footer">
            &copy; {{ .Year }} QRky. All rights reserved.
        </div>
    </div>
</body>
</html>
